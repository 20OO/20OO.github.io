<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify-like Theme</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My Music App</h1>
    </header>
    <main>
        <section class="featured-playlists">
            <h2>Featured Playlists</h2>
            <div class="playlist-grid">
                <div class="playlist-card">
                    <a href="https://example.com/chill-vibes" target="_blank">
                        <img src="https://i.pinimg.com/736x/e5/3d/c2/e53dc2651986d5393cbf2b20b57a6d8c.jpg" alt="Chill Vibes Playlist Cover">
                    </a>
                    <h3>Chill Vibes</h3>
                </div>
                <div class="playlist-card">
                    <a href="https://example.com/top-hits" target="_blank">
                        <img src="https://i.pinimg.com/736x/e5/3d/c2/e53dc2651986d5393cbf2b20b57a6d8c.jpg" alt="Top Hits Playlist Cover">
                    </a>
                    <h3>Top Hits</h3>
                </div>
                <div class="playlist-card">
                    <a href="https://example.com/workout-mix" target="_blank">
                        <img src="https://i.pinimg.com/736x/e5/3d/c2/e53dc2651986d5393cbf2b20b57a6d8c.jpg" alt="Workout Mix Playlist Cover">
                    </a>
                    <h3>Workout Mix</h3>
                </div>
                <div class="playlist-card">
                    <a href="https://example.com/party-anthems" target="_blank">
                        <img src="https://i.pinimg.com/736x/e5/3d/c2/e53dc2651986d5393cbf2b20b57a6d8c.jpg" alt="Party Anthems Playlist Cover">
                    </a>
                    <h3>Party Anthems</h3>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 My Music App</p>
    </footer>
</body>
</html>
