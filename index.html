<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>exy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
cursor:none;
}

body{

background:linear-gradient(-45deg,#020617,#0f172a,#1e293b,#1e1b4b);
background-size:400% 400%;
animation:bg 12s ease infinite;

color:white;
text-align:center;
overflow:hidden;

}

@keyframes bg{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

/* custom cursor */

.cursor{

width:15px;
height:15px;

border:2px solid white;
border-radius:50%;

position:fixed;

pointer-events:none;

transform:translate(-50%,-50%);

z-index:1000;

}

/* particles */

canvas{

position:fixed;
top:0;
left:0;

z-index:0;

}

/* glass card */

.card{

position:relative;

z-index:2;

width:320px;

margin:auto;

margin-top:90px;

padding:25px;

background:rgba(255,255,255,0.06);

backdrop-filter:blur(15px);

border-radius:20px;

border:1px solid rgba(255,255,255,0.15);

}

/* banner */

.banner{

height:150px;

background:url("https://i.pinimg.com/originals/e1/e6/d6/e1e6d6148ec6ae3b0a2c8a3a336dcad3.gif");

background-size:cover;

border-radius:15px;

}

/* avatar */

.avatar{

width:110px;
height:110px;

border-radius:50%;

border:4px solid white;

margin-top:-55px;

}

/* typing */

#name{

font-size:30px;

margin-top:10px;

}

/* buttons */

.links{

display:flex;

flex-direction:column;

gap:12px;

margin-top:20px;

}

.btn{

padding:12px;

border-radius:10px;

background:rgba(255,255,255,0.1);

text-decoration:none;

color:white;

transition:0.25s;

}

.btn:hover{

transform:scale(1.08);

background:rgba(255,255,255,0.2);

}

/* visualizer */

#visualizer{

position:fixed;

bottom:0;
left:0;

width:100%;
height:120px;

z-index:1;

}

</style>
</head>

<body>

<div class="cursor"></div>

<canvas id="particles"></canvas>

<canvas id="visualizer"></canvas>

<div class="card">

<div class="banner"></div>

<img class="avatar" src="https://i.pinimg.com/originals/41/b0/58/41b0589ec63f348d427d502131b93cd2.gif">

<h1 id="name"></h1>

<p>Student • Learning Programming</p>

<div class="links">

<a class="btn" href="https://youtube.com/@0ox0" target="_blank">
YouTube
</a>

<a class="btn" href="https://tiktok.com/@28x1o" target="_blank">
TikTok
</a>

<a class="btn" href="https://facebook.com/28OOO" target="_blank">
Facebook
</a>

<a class="btn" href="https://github.com/20OO" target="_blank">
GitHub
</a>

</div>

</div>

<audio id="music" src="https://files.catbox.moe/7l6h4q.mp3" crossorigin="anonymous"></audio>

<script>

/* typing effect */

const text="exy"

let i=0

function type(){

if(i<text.length){

document.getElementById("name").innerHTML+=text.charAt(i)

i++

setTimeout(type,150)

}

}

type()

/* cursor */

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"

})

/* particles */

const canvas=document.getElementById("particles")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2+1,

dx:(Math.random()-0.5),

dy:(Math.random()-0.5)

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.beginPath()

ctx.arc(p.x,p.y,p.r,0,Math.PI*2)

ctx.fillStyle="white"

ctx.fill()

p.x+=p.dx
p.y+=p.dy

})

requestAnimationFrame(draw)

}

draw()

/* audio visualizer */

const audio=document.getElementById("music")

const audioCtx=new AudioContext()

const analyser=audioCtx.createAnalyser()

const source=audioCtx.createMediaElementSource(audio)

source.connect(analyser)

analyser.connect(audioCtx.destination)

analyser.fftSize=256

const bufferLength=analyser.frequencyBinCount

const dataArray=new Uint8Array(bufferLength)

const vcanvas=document.getElementById("visualizer")

const vctx=vcanvas.getContext("2d")

vcanvas.width=window.innerWidth
vcanvas.height=120

function visualize(){

requestAnimationFrame(visualize)

analyser.getByteFrequencyData(dataArray)

vctx.clearRect(0,0,vcanvas.width,vcanvas.height)

let barWidth=vcanvas.width/bufferLength

for(let i=0;i<bufferLength;i++){

let barHeight=dataArray[i]

vctx.fillStyle="white"

vctx.fillRect(i*barWidth,vcanvas.height-barHeight/2,barWidth-1,barHeight)

}

}

visualize()

/* start music */

document.addEventListener("click",()=>{

audioCtx.resume()

audio.play()

},{once:true})

</script>

</body>
</html>
