<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exy</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;cursor:none}

body{
background:linear-gradient(-45deg,#020617,#0f172a,#1e293b,#1e1b4b);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:#fff;
text-align:center;
overflow:hidden
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* loader */

#loader{
position:fixed;
width:100%;
height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:2000
}

.spin{
width:60px;height:60px;border:5px solid #334155;border-top:5px solid #38bdf8;border-radius:50%;
animation:spin 1s linear infinite
}

@keyframes spin{to{transform:rotate(360deg)}}

/* cursor */

.cursor{
width:14px;height:14px;border:2px solid #fff;border-radius:50%;
position:fixed;pointer-events:none;z-index:1000;
transform:translate(-50%,-50%)
}

.trail{
position:fixed;width:6px;height:6px;background:#fff;border-radius:50%;
pointer-events:none;opacity:.6;animation:fade .5s linear forwards
}

@keyframes fade{to{transform:scale(0);opacity:0}}

/* particles */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0
}

/* card */

.card{
position:relative;
z-index:2;
width:320px;
margin:auto;
margin-top:120px;
padding:25px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(15px);
border-radius:20px;
border:1px solid rgba(255,255,255,.15)
}

.banner{
height:150px;
background:url("https://i.pinimg.com/originals/e1/e6/d6/e1e6d6148ec6ae3b0a2c8a3a336dcad3.gif");
background-size:cover;border-radius:15px
}

.avatarBox{
position:relative;
width:120px;
height:120px;
margin:auto;
margin-top:-60px
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #fff;
position:absolute;
top:5px;
left:5px
}

#circleVis{
position:absolute;
top:0;
left:0;
width:120px;
height:120px;
}

#name{font-size:30px;margin-top:15px}

.links{display:flex;flex-direction:column;gap:12px;margin-top:20px}

.btn{
padding:12px;border-radius:10px;
background:rgba(255,255,255,.1);
text-decoration:none;color:#fff;
transition:.2s
}

.btn:hover{
transform:scale(1.08);
background:rgba(255,255,255,.2)
}

/* bottom visualizer */

#visualizer{
position:fixed;
bottom:0;
left:0;
width:100%;
height:120px;
z-index:1
}

</style>

</head>

<body>

<div id="loader"><div class="spin"></div></div>

<div class="cursor"></div>

<canvas id="particles"></canvas> <canvas id="visualizer"></canvas>

<div class="card">

<div class="banner"></div>

<div class="avatarBox">

<canvas id="circleVis"></canvas>

<img class="avatar" src="https://i.pinimg.com/originals/41/b0/58/41b0589ec63f348d427d502131b93cd2.gif">

</div>

<h1 id="name"></h1>

<p>18+ • Learning Programming</p>

<div class="links">
<a class="btn" href="https://youtube.com/@0ox0">YouTube</a>
<a class="btn" href="https://tiktok.com/@28x1o">TikTok</a>
<a class="btn" href="https://facebook.com/28OOO">Facebook</a>
<a class="btn" href="https://github.com/20OO">GitHub</a>
</div>

</div>

<audio id="music" preload="auto"
src="https://cs1.mp3.pm/listen/244459282/amdUMFJFdmx0VDEyeHliNU9BRHFudEZ1aHl2aFQvUzVVbCtVaTVBNmhHU1RIZ01vOFE2ZWJYU2dkS3RhN3JzRlZxQ1hVTEk1U2FuVllRbkxralJBZHF2OG1GRUE5MUNvMU41emJzU1ZzTE9meWNRWlpVMW81R1hTSnZQS0tYT1Y/74Seventy-Four_-_all_i_want_is_you_Rebzyyx_slow_(mp3.pm).mp3"></audio>

<script>

/* loader */

const loader=document.getElementById("loader")
setTimeout(()=>loader.style.display="none",2500)

/* typing name */

const nameText="exy"
let ni=0
const nameEl=document.getElementById("name")

function type(){
if(ni<nameText.length){
nameEl.textContent+=nameText[ni++]
setTimeout(type,150)
}
}
type()

/* cursor */

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"

const t=document.createElement("div")
t.className="trail"
t.style.left=e.clientX+"px"
t.style.top=e.clientY+"px"

document.body.appendChild(t)
setTimeout(()=>t.remove(),500)
})

/* particles */

const pcanvas=document.getElementById("particles")
const pctx=pcanvas.getContext("2d")

function resize(){
pcanvas.width=innerWidth
pcanvas.height=innerHeight
}
resize()
addEventListener("resize",resize)

const particles=Array.from({length:70},()=>({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
r:Math.random()*2+1,
dx:(Math.random()-.5),
dy:(Math.random()-.5)
}))

function pdraw(){
pctx.clearRect(0,0,pcanvas.width,pcanvas.height)

for(const p of particles){
pctx.beginPath()
pctx.arc(p.x,p.y,p.r,0,Math.PI*2)
pctx.fillStyle="#fff"
pctx.fill()

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>pcanvas.width)p.dx*=-1
if(p.y<0||p.y>pcanvas.height)p.dy*=-1
}

requestAnimationFrame(pdraw)
}

pdraw()

/* audio + visualizers */

const audio=document.getElementById("music")
const vcanvas=document.getElementById("visualizer")
const vctx=vcanvas.getContext("2d")

const circle=document.getElementById("circleVis")
const cctx=circle.getContext("2d")

circle.width=120
circle.height=120

vcanvas.width=innerWidth
vcanvas.height=120

let audioCtx, analyser, dataArray

function startAudio(){

if(audioCtx)return

audioCtx=new AudioContext()
analyser=audioCtx.createAnalyser()

const src=audioCtx.createMediaElementSource(audio)

src.connect(analyser)
analyser.connect(audioCtx.destination)

analyser.fftSize=128
dataArray=new Uint8Array(analyser.frequencyBinCount)

visualize()

audio.play()

}

function visualize(){

requestAnimationFrame(visualize)

analyser.getByteFrequencyData(dataArray)

/* bottom bars */

vctx.clearRect(0,0,vcanvas.width,vcanvas.height)

const w=vcanvas.width/dataArray.length

for(let i=0;i<dataArray.length;i++){

let h=dataArray[i]

vctx.fillStyle="#fff"
vctx.fillRect(i*w,vcanvas.height-h/2,w-2,h)

}

/* circle visualizer */

cctx.clearRect(0,0,120,120)

const bars=60
const radius=40

for(let i=0;i<bars;i++){

let value=dataArray[i]
let angle=(i/bars)*Math.PI*2

let bar=value/8

let x1=60+Math.cos(angle)*radius
let y1=60+Math.sin(angle)*radius

let x2=60+Math.cos(angle)*(radius+bar)
let y2=60+Math.sin(angle)*(radius+bar)

cctx.strokeStyle="#38bdf8"
cctx.lineWidth=2

cctx.beginPath()
cctx.moveTo(x1,y1)
cctx.lineTo(x2,y2)
cctx.stroke()

}

}

addEventListener("click",startAudio,{once:true})

/* title typing */

const titles=[
"exy",
"exy | developer",
"exy | coder",
"exy | learning programming"
]

let ti=0
let ci=0
let del=false

function titleLoop(){

let txt=titles[ti]

if(!del){
document.title=txt.substring(0,ci+1)+"_"
ci++

if(ci===txt.length){
del=true
setTimeout(titleLoop,1200)
return
}

}else{

document.title=txt.substring(0,ci-1)+"_"
ci--

if(ci===0){
del=false
ti=(ti+1)%titles.length
}

}

setTimeout(titleLoop,120)

}

titleLoop()

</script>

</body>
</html>
