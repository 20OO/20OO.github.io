<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exy</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;cursor:none}

body{
background:linear-gradient(-45deg,#020617,#0f172a,#1e293b,#1e1b4b);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:#fff;
text-align:center;
overflow:hidden
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* loader */

#loader{
position:fixed;
width:100%;
height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:2000
}

.spin{
width:60px;height:60px;border:5px solid #334155;border-top:5px solid #38bdf8;border-radius:50%;
animation:spin 1s linear infinite
}

@keyframes spin{to{transform:rotate(360deg)}}

/* cursor */

.cursor{
width:14px;height:14px;border:2px solid #fff;border-radius:50%;
position:fixed;pointer-events:none;z-index:1000;
transform:translate(-50%,-50%)
}

.trail{
position:fixed;width:6px;height:6px;background:#fff;border-radius:50%;
pointer-events:none;opacity:.6;animation:fade .5s linear forwards
}

@keyframes fade{to{transform:scale(0);opacity:0}}

/* layout */

.card{
position:relative;z-index:2;width:320px;margin:auto;margin-top:90px;padding:25px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(15px);
border-radius:20px;border:1px solid rgba(255,255,255,.15)
}

.banner{
height:150px;
background:url("https://i.pinimg.com/originals/e1/e6/d6/e1e6d6148ec6ae3b0a2c8a3a336dcad3.gif");
background-size:cover;border-radius:15px
}

.avatar{
width:110px;height:110px;border-radius:50%;
border:4px solid #fff;margin-top:-55px
}

#name{font-size:30px;margin-top:10px}

.links{display:flex;flex-direction:column;gap:12px;margin-top:20px}

.btn{
padding:12px;border-radius:10px;
background:rgba(255,255,255,.1);
text-decoration:none;color:#fff;
transition:.2s
}

.btn:hover{
transform:scale(1.08);
background:rgba(255,255,255,.2)
}

#visualizer{
position:fixed;bottom:0;left:0;width:100%;height:120px;z-index:1
}

.qrbox{margin-top:20px;animation:qr 2s infinite}

@keyframes qr{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

</style>

</head>

<body>

<div id="loader"><div class="spin"></div></div>

<div class="cursor"></div>

<canvas id="particles"></canvas> <canvas id="visualizer"></canvas>

<div class="card">

<div class="banner"></div>

<img class="avatar" src="https://i.pinimg.com/originals/41/b0/58/41b0589ec63f348d427d502131b93cd2.gif">

<h1 id="name"></h1>

<p>18+ • Learning Programming</p>

<div class="links">
<a class="btn" href="https://youtube.com/@0ox0">YouTube</a>
<a class="btn" href="https://tiktok.com/@28x1o">TikTok</a>
<a class="btn" href="https://facebook.com/28OOO">Facebook</a>
<a class="btn" href="https://github.com/20OO">GitHub</a>
</div>

<div class="qrbox">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://20OO.github.io">
</div>

</div>

<audio id="music" preload="auto"
src="https://cs1.mp3.pm/listen/244459282/amdUMFJFdmx0VDEyeHliNU9BRHFudEZ1aHl2aFQvUzVVbCtVaTVBNmhHU1RIZ01vOFE2ZWJYU2dkS3RhN3JzRlZxQ1hVTEk1U2FuVllRbkxralJBZHF2OG1GRUE5MUNvMU41emJzU1ZzTE9meWNRWlpVMW81R1hTSnZQS0tYT1Y/74Seventy-Four_-_all_i_want_is_you_Rebzyyx_slow_(mp3.pm).mp3"></audio>

<script>

/* loader */

setTimeout(()=>loader.style.display="none",3000)

/* typing */

const name="exy"
let i=0
const nameEl=document.getElementById("name")

function type(){
if(i<name.length){
nameEl.textContent+=name[i++]
setTimeout(type,150)
}
}
type()

/* cursor */

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"

const t=document.createElement("div")
t.className="trail"
t.style.left=e.clientX+"px"
t.style.top=e.clientY+"px"

document.body.appendChild(t)
setTimeout(()=>t.remove(),500)
})

/* particles */

const pcanvas=document.getElementById("particles")
const pctx=pcanvas.getContext("2d")

function resize(){
pcanvas.width=innerWidth
pcanvas.height=innerHeight
}
resize()
addEventListener("resize",resize)

const particles=Array.from({length:70},()=>({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
r:Math.random()*2+1,
dx:(Math.random()-.5),
dy:(Math.random()-.5)
}))

function pdraw(){

pctx.clearRect(0,0,pcanvas.width,pcanvas.height)

for(const p of particles){

pctx.beginPath()
pctx.arc(p.x,p.y,p.r,0,Math.PI*2)
pctx.fillStyle="#fff"
pctx.fill()

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>pcanvas.width)p.dx*=-1
if(p.y<0||p.y>pcanvas.height)p.dy*=-1

}

requestAnimationFrame(pdraw)
}

pdraw()

/* visualizer */

const audio=document.getElementById("music")
const vcanvas=document.getElementById("visualizer")
const vctx=vcanvas.getContext("2d")

vcanvas.width=innerWidth
vcanvas.height=120

let audioCtx, analyser, dataArray

function startAudio(){

audioCtx=new AudioContext()
analyser=audioCtx.createAnalyser()
const src=audioCtx.createMediaElementSource(audio)

src.connect(analyser)
analyser.connect(audioCtx.destination)

analyser.fftSize=128

dataArray=new Uint8Array(analyser.frequencyBinCount)

visualize()

audio.play()

}

function visualize(){

requestAnimationFrame(visualize)

analyser.getByteFrequencyData(dataArray)

vctx.clearRect(0,0,vcanvas.width,vcanvas.height)

const w=vcanvas.width/dataArray.length

for(let i=0;i<dataArray.length;i++){

let h=dataArray[i]

vctx.fillStyle="#fff"
vctx.fillRect(i*w,vcanvas.height-h/2,w-1,h)

}

}

addEventListener("click",startAudio,{once:true})
/* title animation optimized */

(function(){

const titles = [
"exy",
"exy | developer",
"exy | coder",
"exy | learning programming"
];

let t = 0;
let c = 0;
let deleting = false;
let cursor = true;

function updateTitle(){

let text = titles[t];

if(!deleting){
c++;
if(c >= text.length){
deleting = true;
setTimeout(updateTitle,1200);
}else{
setTimeout(updateTitle,120);
}
}else{
c--;
if(c <= 0){
deleting = false;
t = (t+1) % titles.length;
setTimeout(updateTitle,300);
}else{
setTimeout(updateTitle,80);
}
}

document.title = text.substring(0,c) + (cursor ? "_" : "");

}

/* cursor blink */

setInterval(()=>{
cursor = !cursor;
},500);

updateTitle();

})();

</script>
</body>
</html>
