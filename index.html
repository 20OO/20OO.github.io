<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exy</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;cursor:none}
        body{
            background:linear-gradient(-45deg,#020617,#0f172a,#1e293b,#1e1b4b);
            background-size:400% 400%;
            animation:bg 12s ease infinite;
            color:#fff;
            text-align:center;
            overflow:hidden
        }
        @keyframes bg{0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}}

        /* Loader - Cải tiến: Dùng logic chờ tải xong thay vì đếm giờ */
        #loader{position:fixed;width:100%;height:100%;background:#020617;display:flex;align-items:center;justify-content:center;z-index:2000;transition: opacity 0.5s ease;}
        .spin{width:60px;height:60px;border:5px solid #334155;border-top:5px solid #38bdf8;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Cursor */
        .cursor{width:14px;height:14px;border:2px solid #fff;border-radius:50%;position:fixed;pointer-events:none;z-index:1000;transform:translate(-50%,-50%)}
        .trail{position:fixed;width:6px;height:6px;background:#fff;border-radius:50%;pointer-events:none;opacity:.6;animation:fade .5s linear forwards}
        @keyframes fade{to{transform:scale(0);opacity:0}}

        /* Layout */
        .card{position:relative;z-index:2;width:320px;margin:auto;margin-top:90px;padding:25px;background:rgba(255,255,255,.06);backdrop-filter:blur(15px);border-radius:20px;border:1px solid rgba(255,255,255,.15)}
        .banner{height:150px;background:url("https://i.pinimg.com/originals/e1/e6/d6/e1e6d6148ec6ae3b0a2c8a3a336dcad3.gif");background-size:cover;border-radius:15px}
        .avatar{width:110px;height:110px;border-radius:50%;border:4px solid #fff;margin-top:-55px}
        #name{font-size:30px;margin-top:10px}
        .links{display:flex;flex-direction:column;gap:12px;margin-top:20px}
        .btn{padding:12px;border-radius:10px;background:rgba(255,255,255,.1);text-decoration:none;color:#fff;transition:.2s}
        .btn:hover{transform:scale(1.08);background:rgba(255,255,255,.2)}
        #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
        #visualizer{position:fixed;bottom:0;left:0;width:100%;height:150px;z-index:1;pointer-events:none;}
        .qrbox{margin-top:20px;animation:qr 2s infinite}
        @keyframes qr{0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)}}
    </style>
</head>

<body>

    <div id="loader"><div class="spin"></div></div>
    <div class="cursor"></div>
    <canvas id="particles"></canvas> 
    <canvas id="visualizer"></canvas>

    <div class="card">
        <div class="banner"></div>
        <img class="avatar" src="https://i.pinimg.com/originals/41/b0/58/41b0589ec63f348d427d502131b93cd2.gif">
        <h1 id="name"></h1>
        <p>18+ • Learning Programming</p>
        <div class="links">
            <a class="btn" href="https://youtube.com/@0ox0">YouTube</a>
            <a class="btn" href="https://tiktok.com/@28x1o">TikTok</a>
            <a class="btn" href="https://facebook.com/28OOO">Facebook</a>
            <a class="btn" href="https://github.com/20OO">GitHub</a>
        </div>
        <div class="qrbox">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://20OO.github.io">
        </div>
    </div>

    <audio id="music" preload="auto" src="https://cs1.mp3.pm/listen/244459282/amdUMFJFdmx0VDEyeHliNU9BRHFudEZ1aHl2aFQvUzVVbCtVaTVBNmhHU1RIZ01vOFE2ZWJYU2dkS3RhN3JzRlZxQ1hVTEk1U2FuVllRbkxralJBZHF2OG1GRUE5MUNvMU41emJzU1ZzTE9meWNRWlpVMW81R1hTSnZQS0tYT1Y/74Seventy-Four_-_all_i_want_is_you_Rebzyyx_slow_(mp3.pm).mp3"></audio>

    <script>
        /* Cải tiến: Loader chỉ tắt khi trang đã load xong hoàn toàn */
        const loader = document.getElementById("loader");
        window.addEventListener("load", () => {
            loader.style.opacity = "0";
            setTimeout(() => loader.style.display = "none", 500);
        });

        /* Typing name & Cursor logic giữ nguyên... */
        const nameText="exy"; let ni=0; const nameEl=document.getElementById("name");
        function type(){ if(ni<nameText.length){ nameEl.textContent+=nameText[ni++]; setTimeout(type,150); } }
        type();

        const cursor=document.querySelector(".cursor");
        document.addEventListener("mousemove",e=>{
            cursor.style.left=e.clientX+"px"; cursor.style.top=e.clientY+"px";
            const t=document.createElement("div"); t.className="trail";
            t.style.left=e.clientX+"px"; t.style.top=e.clientY+"px";
            document.body.appendChild(t); setTimeout(()=>t.remove(),500);
        });

        /* Visualizer Cải tiến */
        const audio = document.getElementById("music");
        const canvas = document.getElementById("visualizer");
        const ctx = canvas.getContext("2d");
        let audioCtx, analyser, dataArray, bufferLength;

        function resizeVisualizer(){ canvas.width = window.innerWidth; canvas.height = 150; }
        resizeVisualizer(); window.addEventListener("resize", resizeVisualizer);

        function startAudio(){
            if(audioCtx) return;
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            const src = audioCtx.createMediaElementSource(audio);
            src.connect(analyser); analyser.connect(audioCtx.destination);
            analyser.fftSize = 64; // Giảm fftSize để có thanh to hơn, dễ nhìn hơn
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            audio.play();
            drawVisualizer();
        }

        function drawVisualizer(){
            requestAnimationFrame(drawVisualizer);
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Cải tiến: Tự động tính toán độ rộng thanh dựa trên chiều rộng màn hình
            const barWidth = (canvas.width / bufferLength) * 0.8;
            let x = 0;

            for(let i = 0; i < bufferLength; i++){
                const barHeight = (dataArray[i] / 255) * canvas.height;
                ctx.fillStyle = "#38bdf8";
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 2; // Thêm khoảng cách giữa các thanh
            }
        }
        window.addEventListener("click", startAudio, {once: true});
    </script>
</body>
</html>
