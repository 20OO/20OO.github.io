<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>exy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
color:white;
text-align:center;
overflow:hidden;

background:linear-gradient(-45deg,#020617,#0f172a,#1e293b,#1e1b4b);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* particles canvas */

#particles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
}

/* loading */

#loader{
position:fixed;
width:100%;
height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.spinner{
border:6px solid #334155;
border-top:6px solid #38bdf8;
border-radius:50%;
width:50px;
height:50px;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* glass card */

.card{

position:relative;
z-index:2;

margin-top:80px;
width:320px;

padding:25px;
margin-left:auto;
margin-right:auto;

background:rgba(255,255,255,0.05);

border-radius:20px;

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.15);
}

/* banner */

.banner{
width:100%;
height:160px;
background:url("https://i.pinimg.com/736x/8e/8f/44/8e8f44c1f613efe5af1a711b9f8f0e93.jpg");
background-size:cover;
border-radius:15px;
}

/* avatar */

.avatar{
width:110px;
height:110px;
border-radius:50%;
border:4px solid rgba(255,255,255,0.4);
margin-top:-55px;
}

/* typing text */

#name{
font-size:30px;
margin-top:10px;
}

/* buttons */

.links{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.btn{

padding:12px;

border-radius:10px;

background:rgba(255,255,255,0.08);

text-decoration:none;
color:white;

transition:0.25s;

}

.btn:hover{
transform:scale(1.07);
background:rgba(255,255,255,0.2);
}

/* discord widget */

.discord{
margin-top:15px;
}

/* footer */

.footer{
margin-top:15px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
</div>

<canvas id="particles"></canvas>

<div class="card">

<div class="banner"></div>

<img class="avatar" src="https://i.pinimg.com/originals/41/b0/58/41b0589ec63f348d427d502131b93cd2.gif">

<h1 id="name"></h1>

<p>Student • Learning Programming</p>

<div class="links">

<a class="btn" href="https://youtube.com/@0ox0" target="_blank">
YouTube
</a>

<a class="btn" href="https://tiktok.com/@28x1o" target="_blank">
TikTok
</a>

<a class="btn" href="https://facebook.com/28OOO" target="_blank">
Facebook
</a>

<a class="btn" href="https://github.com/20OO" target="_blank">
GitHub
</a>

</div>

<div class="discord">

<iframe src="https://lanyard.cnrad.dev/api/discord/900581050256850984"
width="280"
height="80"
frameborder="0">
</iframe>

</div>

<div class="footer">
© exy
</div>

</div>

<audio id="music" loop>
<source src="https://files.catbox.moe/7l6h4q.mp3">
</audio>

<script>

/* loading */

window.onload = function(){
document.getElementById("loader").style.display="none"
}

/* typing effect */

const text="exy"
let i=0

function typing(){

if(i<text.length){

document.getElementById("name").innerHTML+=text.charAt(i)

i++

setTimeout(typing,150)

}

}

typing()

/* music start */

document.addEventListener("click",function(){

document.getElementById("music").play()

},{once:true})

/* particles */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<70;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2+1,

dx:(Math.random()-0.5),

dy:(Math.random()-0.5)

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.beginPath()

ctx.arc(p.x,p.y,p.r,0,Math.PI*2)

ctx.fillStyle="white"

ctx.fill()

p.x+=p.dx

p.y+=p.dy

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
