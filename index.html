<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>raven</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
cursor:url("https://cdn.cursors-4u.net/css-previews/bobblehead-bunny-005ae02f-css.webp"), auto;

background:linear-gradient(-45deg,#0f172a,#1e293b,#020617,#0f172a);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
display:flex;
gap:40px;
align-items:center;
}

.card{
width:320px;
padding:30px;
text-align:center;

background:rgba(255,255,255,0.05);
border-radius:20px;

backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);

box-shadow:0 20px 40px rgba(0,0,0,0.6);

transition:transform .25s ease-out;
transform-style:preserve-3d;
will-change:transform;
}

.banner{
height:120px;
background:url("https://images-ext-1.discordapp.net/external/9XROBbLqb4wynjLkhHHFmAsWv73ROa7NERu6eWLI-Tw/https/i.pinimg.com/originals/1b/83/3c/1b833c993c0f583e0b2bc3de2231fa24.gif") center/cover;
border-radius:14px;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
border:4px solid white;
margin-top:-55px;

transition:all .25s ease;
cursor:pointer;
}

.avatar:hover{
transform:scale(1.08) translateY(-4px);

box-shadow:
0 0 20px rgba(255,255,255,0.4),
0 10px 20px rgba(0,0,0,0.5);
}

h2{
margin-top:10px;
}

.bio{
margin-top:10px;
color:#cbd5e1;
min-height:22px;
}

.links{
margin-top:20px;
}

.links a{
display:block;
margin:10px 0;
padding:12px;

background:rgba(255,255,255,0.08);
border-radius:12px;

color:white;
text-decoration:none;

transition:all .25s;
}

.links a:hover{
transform:translateY(-4px) scale(1.05);
background:rgba(255,255,255,0.2);
box-shadow:0 10px 20px rgba(0,0,0,.5);
}

.video-card{
width:320px;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.video-card iframe{
border-radius:12px;
}

.music{
margin-top:15px;
padding:8px 15px;
border-radius:20px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;

transition:all .25s;
}

.music:hover{

transform:translateY(-3px) scale(1.05);
background:rgba(255,255,255,0.2);

box-shadow:0 10px 20px rgba(0,0,0,.5);

}

.theme-btn{
margin-top:10px;
padding:10px 16px;
border-radius:20px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;

transition:all .25s;
}

.theme-btn:hover{

transform:translateY(-3px) scale(1.05);
background:rgba(255,255,255,0.2);

box-shadow:0 10px 20px rgba(0,0,0,.5);

}

.trail{
position:fixed;
width:8px;
height:8px;
background:white;
border-radius:50%;
pointer-events:none;
z-index:999;
opacity:.7;

filter:blur(1px);
box-shadow:0 0 10px white,0 0 20px rgba(255,255,255,0.5);
}

.heart{
position:fixed;
bottom:-20px;
font-size:16px;
pointer-events:none;
animation:floatUp linear forwards;
opacity:0.8;
}

@keyframes floatUp{

0%{
transform:translateY(0) scale(1);
opacity:0.9;
}

100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}

}

/* loader */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;

display:flex;
align-items:center;
justify-content:center;

z-index:99999;
cursor:pointer;

transition:opacity .5s ease;
}

.loader-text{
font-size:28px;
letter-spacing:4px;
color:white;
opacity:0.8;
}

/* ripple */

.full-ripple{
position:fixed;
left:50%;
top:50%;

width:20px;
height:20px;

border-radius:50%;
background:white;

transform:translate(-50%,-50%) scale(0);

animation:fullRipple 1s ease-out forwards;

z-index:9998;
pointer-events:none;
}

@keyframes fullRipple{

0%{
transform:translate(-50%,-50%) scale(0);
opacity:0.9;
}

100%{
transform:translate(-50%,-50%) scale(120);
opacity:0;
}

}

/* blur transition */

.blur-transition{
filter:blur(15px);
transition:filter .6s ease;
}

/* fade */

.fade-theme{
animation:themeFade .8s ease;
}

@keyframes themeFade{

from{
opacity:0;
transform:scale(.98);
}

to{
opacity:1;
transform:scale(1);
}

}

</style>
</head>

<body>

<div id="loader">
<div class="loader-text">enter</div>
</div>

<div class="container">

<div class="card tilt">

<div class="banner"></div>

<img src="https://images-ext-1.discordapp.net/external/BrcDJVHUiTib88-lAwaps2G8teb9efdavWsLr7y6Kb8/https/i.pinimg.com/originals/41/b0/58/41b0589ec63f348d427d502131b93cd2.gif" class="avatar">

<h2>raven</h2>

<p class="bio" id="bio"></p>

<div class="links">
<a href="https://www.facebook.com/28OOO" target="_blank">Facebook</a>
<a href="https://www.tiktok.com/@28x1o" target="_blank">TikTok</a>
<a href="https://www.youtube.com/@0ox0" target="_blank">YouTube</a>
<a href="https://discord.com/users/900581050256850984" target="_blank">Discord</a>
</div>

<button class="music" onclick="toggleMusic()">Play Music</button>
<button id="themeBtn" class="theme-btn">Switch Theme</button>

</div>

<div class="card video-card tilt">

<iframe
id="videoPlayer"
width="300"
height="170"
src="https://www.youtube.com/embed/7o4o9NspwMk?enablejsapi=1"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

</div>

<audio id="music" loop>
<source src="https://cdn.discordapp.com/attachments/1142041677771571310/1480571823597813800/chinesemusic.mp3?ex=69b02976&is=69aed7f6&hm=6b8f83b40621fc5dc06037fbb662a38dd99d2666e3e8813d37664ca71fc6fde1&">
</audio>

<script>

/* loader */

const loader=document.getElementById("loader")
const music=document.getElementById("music")

loader.addEventListener("click",()=>{

music.volume=0.6
music.play()

loader.style.opacity="0"

setTimeout(()=>{
loader.style.display="none"
},600)

})

/* typing bio */

const texts=[
"Love fades, memories don't.",
"True friends build on trust, not promises.",
"18+"
]

const bio=document.getElementById("bio")

let textIndex=0
let charIndex=0

function typeText(){

if(charIndex<texts[textIndex].length){

bio.innerHTML+=texts[textIndex].charAt(charIndex)
charIndex++

setTimeout(typeText,60)

}else{

setTimeout(()=>{

bio.innerHTML=""
charIndex=0
textIndex=(textIndex+1)%texts.length
typeText()

},20000)

}

}

typeText()

/* music */

function toggleMusic(){

if(music.paused){
music.play()
}else{
music.pause()
}

}

/* tilt */

const cards=document.querySelectorAll(".tilt")

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2 - e.pageX)/30
const y=(window.innerHeight/2 - e.pageY)/30

cards.forEach(card=>{
card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`
})

})

/* cursor trail */

const dots=[]

for(let i=0;i<18;i++){

const d=document.createElement("div")
d.className="trail"
document.body.appendChild(d)

dots.push({x:0,y:0,el:d})

}

let mouseX=0
let mouseY=0

document.addEventListener("mousemove",(e)=>{
mouseX=e.clientX
mouseY=e.clientY
})

function animate(){

let x=mouseX
let y=mouseY

dots.forEach(dot=>{

dot.x+=(x-dot.x)*0.25
dot.y+=(y-dot.y)*0.25

dot.el.style.left=dot.x+"px"
dot.el.style.top=dot.y+"px"

x=dot.x
y=dot.y

})

requestAnimationFrame(animate)

}

animate()

/* hearts */

function createHeart(){

const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},8000)

}

setInterval(createHeart,500)

/* theme switch */

const themeBtn=document.getElementById("themeBtn")

let themeActive=false
let videoBg=null

themeBtn.addEventListener("click",()=>{

const ripple=document.createElement("div")
ripple.className="full-ripple"
document.body.appendChild(ripple)

document.body.classList.add("blur-transition")

setTimeout(toggleTheme,400)

setTimeout(()=>{
document.body.classList.remove("blur-transition")
},900)

})

function toggleTheme(){

const container=document.querySelector(".container")
const avatar=document.querySelector(".avatar")
const banner=document.querySelector(".banner")

container.classList.add("fade-theme")

if(!themeActive){

avatar.src="https://i.pinimg.com/originals/a6/b6/8e/a6b68e1b5f7ffe5d793d4812414a8499.gif"

banner.style.backgroundImage="url('https://i.pinimg.com/originals/a4/82/c8/a482c8ae90349b9942330715b300599f.gif')"

videoBg=document.createElement("video")

videoBg.src="https://moewalls.com/wp-content/uploads/preview/2026/mornye-galaxy-stars-wuthering-waves-preview.webm"

videoBg.autoplay=true
videoBg.loop=true
videoBg.muted=true

videoBg.style.position="fixed"
videoBg.style.top="0"
videoBg.style.left="0"
videoBg.style.width="100%"
videoBg.style.height="100%"
videoBg.style.objectFit="cover"
videoBg.style.zIndex="-2"

document.body.appendChild(videoBg)

themeActive=true

}else{

avatar.src="https://images-ext-1.discordapp.net/external/BrcDJVHUiTib88-lAwaps2G8teb9efdavWsLr7y6Kb8/https/i.pinimg.com/originals/41/b0/58/41b0589ec63f348d427d502131b93cd2.gif"

banner.style.backgroundImage='url("https://images-ext-1.discordapp.net/external/9XROBbLqb4wynjLkhHHFmAsWv73ROa7NERu6eWLI-Tw/https/i.pinimg.com/originals/1b/83/3c/1b833c993c0f583e0b2bc3de2231fa24.gif")'

if(videoBg){
videoBg.remove()
videoBg=null
}

themeActive=false

}

}

</script>

</body>
</html>
