<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>raven</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
cursor:url("https://cdn.cursors-4u.net/css-previews/bobblehead-bunny-005ae02f-css.webp"), auto;
background:linear-gradient(-45deg,#0f172a,#1e293b,#020617,#0f172a);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
display:flex;
gap:40px;
align-items:center;
}

.card{
width:320px;
padding:30px;
text-align:center;

background:rgba(255,255,255,0.05);
border-radius:20px;

backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);

box-shadow:0 20px 40px rgba(0,0,0,0.6);

transition:transform .15s;
transform-style:preserve-3d;
}

.banner{
height:120px;
background:url("https://i.pinimg.com/originals/56/93/9e/56939eaada6c55621f9c8cb644e203bc.gif") center/cover;
border-radius:14px;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
border:4px solid white;
margin-top:-55px;
}

h2{
margin-top:10px;
}

.bio{
margin-top:10px;
color:#cbd5e1;
min-height:22px;
}

.links{
margin-top:20px;
}

.links a{
display:block;
margin:10px 0;
padding:12px;

background:rgba(255,255,255,0.08);
border-radius:12px;

color:white;
text-decoration:none;

transition:all .25s;
}

.links a:hover{
transform:translateY(-4px) scale(1.05);
background:rgba(255,255,255,0.2);
box-shadow:0 10px 20px rgba(0,0,0,.5);
}

.video-card{
width:320px;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.video-card iframe{
border-radius:12px;
}

.music{
margin-top:15px;
padding:8px 15px;
border-radius:20px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
}

.trail{
position:fixed;
width:8px;
height:8px;
background:white;
border-radius:50%;
pointer-events:none;
z-index:999;
opacity:.7;
}

.heart{
position:fixed;
bottom:-20px;
font-size:16px;
pointer-events:none;
animation:floatUp linear forwards;
opacity:0.8;
}

@keyframes floatUp{

0%{
transform:translateY(0) scale(1);
opacity:0.9;
}

100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}

}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;

display:flex;
align-items:center;
justify-content:center;

z-index:99999;
cursor:pointer;
}

.loader-text{
font-size:28px;
letter-spacing:4px;
color:white;
opacity:0.8;
transition:0.3s;
}

.loader-text:hover{
opacity:1;
transform:scale(1.1);
}

</style>

</head>

<body>

<div id="loader">
<div class="loader-text">enter</div>
</div>

<div class="container">

<div class="card tilt">

<div class="banner"></div>

<img src="https://i.pinimg.com/originals/41/b0/58/41b0589ec63f348d427d502131b93cd2.gif" class="avatar" draggable="false">

<h2>raven</h2>

<p class="bio" id="bio"></p>

<div class="links">
<a href="https://www.facebook.com/28OOO">Facebook</a>
<a href="https://www.tiktok.com/@28x1o">TikTok</a>
<a href="https://www.youtube.com/@0ox0">YouTube</a>
<a href="https://discord.com/users/900581050256850984">Discord</a>
</div>

<button class="music" onclick="toggleMusic()">Play Music</button>

</div>

<div class="card video-card tilt">

<iframe
id="videoPlayer"
width="300"
height="170"
src="https://www.youtube.com/embed/7o4o9NspwMk?enablejsapi=1"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

</div>

<audio id="music" loop>
<source src="https://cdn.discordapp.com/attachments/1142041677771571310/1480571823597813800/chinesemusic.mp3?ex=69b02976&is=69aed7f6&hm=6b8f83b40621fc5dc06037fbb662a38dd99d2666e3e8813d37664ca71fc6fde1&">
</audio>

<script>

const loader=document.getElementById("loader")
const music=document.getElementById("music")

loader.addEventListener("click",()=>{

music.volume=0.6
music.play()

loader.style.opacity="0"

setTimeout(()=>{
loader.style.display="none"
},500)

})

const texts=[
"Love fades, memories don't.",
"True friends build on trust, not promises.",
"18+"
]

const bio=document.getElementById("bio")

let textIndex=0
let charIndex=0

function typeText(){

if(charIndex<texts[textIndex].length){

bio.innerHTML+=texts[textIndex].charAt(charIndex)
charIndex++

setTimeout(typeText,60)

}else{

setTimeout(()=>{

bio.innerHTML=""
charIndex=0
textIndex=(textIndex+1)%texts.length
typeText()

},10000)

}

}

typeText()

function toggleMusic(){

if(music.paused){
music.play()
}else{
music.pause()
}

}

const cards=document.querySelectorAll(".tilt")

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2 - e.pageX)/25
const y=(window.innerHeight/2 - e.pageY)/25

cards.forEach(card=>{
card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`
})

})

const dots=[]

for(let i=0;i<18;i++){

const d=document.createElement("div")
d.className="trail"
document.body.appendChild(d)

dots.push({x:0,y:0,el:d})

}

let mouseX=0
let mouseY=0

document.addEventListener("mousemove",(e)=>{

mouseX=e.clientX
mouseY=e.clientY

})

function animate(){

let x=mouseX
let y=mouseY

dots.forEach(dot=>{

dot.x+=(x-dot.x)*0.25
dot.y+=(y-dot.y)*0.25

dot.el.style.left=dot.x+"px"
dot.el.style.top=dot.y+"px"

x=dot.x
y=dot.y

})

requestAnimationFrame(animate)

}

animate()

function createHeart(){

const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(4+Math.random()*4)+"s"
heart.style.fontSize=(12+Math.random()*20)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},8000)

}

setInterval(createHeart,500)

let player

function onYouTubeIframeAPIReady(){

player=new YT.Player('videoPlayer',{

events:{

'onStateChange':function(event){

if(event.data===YT.PlayerState.PLAYING){

music.pause()

}

}

}

})

}

const tag=document.createElement("script")
tag.src="https://www.youtube.com/iframe_api"
document.body.appendChild(tag)

</script>

</body>
</html>
